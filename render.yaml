services:
  - type: web
    name: earthquake-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
    disk:
      name: earthquake-data
      mountPath: /data
      sizeGB: 1
